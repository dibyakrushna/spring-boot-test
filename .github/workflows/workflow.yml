name: Deploy CI/CD
on:
  pull_request:
  push:
    branches:
      - main
env:
  APP_NAME: spring-boot-test
jobs:
 test-deploy:
   runs-on: ubuntu-latest
   name: Test
   steps:
     - name: Checkout Code
       uses: actions/checkout@v4
       with:
         fetch-depth: '0'
     - name: Setup JDK
       uses: actions/setup-java@v4
       with:
         java-version: '17'
         distribution: 'corretto'
     - name: Cache Maven dependencies
       uses:  actions/cache@v3
       with:
         path: ~/.m2
         key: ${{ runner.os }}-m2-${{hashFiles('**/pom.xml')}}
         restore-keys: ${{ runner.os }}-m2

 build-and-deploy:
   runs-on: ubuntu-latest
   needs: test-deploy
   if: github.ref == 'refs/heads/main'
   steps:
     - name: Checkout Code
       uses: actions/checkout@v4
       with:
         fetch-depth: '0'
     - name: Setup JDK
       uses: actions/setup-java@v4
       with:
         java-version: '17'
         distribution: 'corretto'
     - name: Cache Maven dependencies
       uses: actions/cache@v3
       with:
         path: ~/.m2
         key: ${{ runner.os }}-m2-${{hashFiles('**/pom.xml')}}
         restore-keys: ${{ runner.os }}-m2
     - name: Extract project version
       id: extract_version
       run: |
         echo "VERSION=$(./mvnw -q -Dexec.executable='echo' -Dexec.args='${project.version}' --non-recursive exec:exec)" >> $GITHUB_OUTPUT
     - name: Build application
       run: ./mvnw clean package -DskipTests
     - name: Set up Docker Buildex
       uses: docker/setup-buildx-action@v3
     - name: Login to Docker hub
       uses: docker/login-action@v3
       with:
         username: ${{ secrets.DOCKER_USERNAME }}
         password: ${{ secrets.DOCKER_PASSWORD }}
     - name: Build and Push Docker image
       uses: docker/build-push-action@v5
       with:
         context: .
         push: true
         tags: |
           ${{ secrets.DOCKER_USERNAME }}/${{ env.APP_NAME }}:1.0.0
         cache-from: type=gha
         cache-to: type=gha,mode=mas
         build-args: |
           PROFILE=dev
     - name: Deploy to VPS
       uses: appleboy/ssh-action@v1.0.0
       with:
         host: ${{ secrets.VPS_HOST }}
         username: ${{ secrets.VPS_USERNAME }}
         key: ${{ secrets.VPS_SSH_KEY }}
         port: ${{ secrets.VPS_PORT }}
         script: |
          #Navigate to app directory 
          sudo mkdir -p /home/ubuntu/${{ env.APP_NAME }}
          sudo chown -R $USER:$USER /home/ubuntu/${{ env.APP_NAME }}
          cd /home/ubuntu/${{ env.APP_NAME }}
          # Create .env file from secrets
            cat > .env << EOF
          DOCKER_USER_NAME=${{ secrets.DOCKER_USERNAME }}
          APP_NAME=${{ env.APP_NAME }}
          APP_VER=1.0.0
          EOF
          #Remove Old composer file
           rm docker-compose.yml
          #Download docker-cmpose.yml 
          if [ ! -f docker-compose.yml ]; then
            curl -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" -o docker-compose.yml https://raw.githubusercontent.com/${{ github.repository }}/refs/heads/main/docker-compose.yml
          fi
          #Pull docker image
           sudo docker compose -f docker-compose.yml --env-file .env pull
          #Stop and remove old containers
           sudo docker compose -f docker-compose.yml --env-file .env  down
          #Start new container
           sudo docker compose -f docker-compose.yml --env-file .env  up -d
          #Clean old image
           sudo docker image prune -f 
            
